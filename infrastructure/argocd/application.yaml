apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: murgdur
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example/murgdur.git
    targetRevision: main
    path: infrastructure/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: murgdur
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
