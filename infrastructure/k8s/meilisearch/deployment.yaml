apiVersion: apps/v1
kind: Deployment
metadata:
  name: meilisearch
  namespace: murgdur
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meilisearch
  template:
    metadata:
      labels:
        app: meilisearch
    spec:
      containers:
        - name: meilisearch
          image: getmeili/meilisearch:v1.8
          ports:
            - containerPort: 7700
          env:
            - name: MEILI_ENV
              value: production
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: murgdur-secrets
                  key: MEILISEARCH_KEY
                  optional: true
