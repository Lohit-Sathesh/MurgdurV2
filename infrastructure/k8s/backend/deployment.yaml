apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: murgdur
spec:
  replicas: 3
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: ghcr.io/example/murgdur-backend:latest
          ports:
            - containerPort: 4000
